<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Pixel Table Tennis</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="512" height="288"></canvas>
        <div id="ui-layer">
            <h1 id="score-display">0 - 0</h1>
            <p id="info-display">Pressione X para Sacar</p>
        </div>
    </div>
    <div class="controls-hint">
        <strong>Setas</strong>: Mover | <strong>X</strong>: Jogar Bola (Saque) | <strong>C</strong>: Forehand | <strong>V</strong>: Backhand
    </div>
    <script src="script.js"></script>
</body>
</html>
